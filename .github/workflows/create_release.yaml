name: "Create release"

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false

jobs:
  # Build:
  #   name: Build ${{ matrix.os }}
  #   runs-on: ${{ matrix.os }}

  #   strategy:
  #     matrix:
  #       os: [
  #         windows-latest
  #         #macos-latest todo
  #       ]

  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: ./.github/actions/build

  Publish:
    name: Publish
    runs-on: ubuntu-latest
    # needs: [ Build ]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build

      - name: Fetch tags
        run: git fetch --tags

      - id: get_last_tag_hash
        name: Get last tag hash
        run: echo "lastTagHash=$(git rev-list --tags --max-count=1)" >> $GITHUB_OUTPUT

      - id: get_current_hash
        name: Get current hash
        run: echo "lastCurrentHash=$(git log --pretty=format:%H)" >> $GITHUB_OUTPUT

      - name: Check new commits
        if: ${{ steps.get_last_tag_hash.outputs.lastTagHash == steps.get_current_hash.outputs.lastCurrentHash }}
        uses: actions/github-script@v7
        with:
          script: core.setFailed('The current commit contains the tag')

      - id: get_last_tag
        name: Get last tag
        run: echo "lastTag=$(git describe --tags ${{ steps.get_last_tag_hash.outputs.lastTagHash }})" >> $GITHUB_OUTPUT

      - id: prepare_notes
        name: Prepare notes
        uses: actions/github-script@v7
        with:
          result-encoding: json
          script: |
            const fs = require('node:fs');
            const script = require('./.github/scripts/prepare_notes.js');

            return await script({
              core: core,
              fs: fs,
              lastTag: '${{ steps.get_last_tag.outputs.lastTag }}'
            });

      - name: Pack
        run: dotnet pack -c Release --no-restore --no-build -o ./_out

      - name: Dbg1
        run: echo ${{ steps.prepare_notes.outputs.version }}

      - name: Dbg2
        run: echo ${{ steps.prepare_notes.outputs.notes }}

      - name: Dbg3
        run: echo ${{ hashFiles('./out/CSharpDepsGraph.Cli.${{ steps.prepare_notes.outputs.version }}.nupkg') }}

      - name: Dbg4
        run: echo ${{ hashFiles('./out/CSharpDepsGraph.Cli.${{ steps.prepare_notes.outputs.version }}.nupkg') == '' }}

      - name: Check nupkg version
        if: ${{ hashFiles('./out/CSharpDepsGraph.Cli.${{ steps.prepare_notes.outputs.version }}.nupkg') == '' }}
        uses: actions/github-script@v7
        with:
          script: core.setFailed('Wrong version of nupkg or file not exists')

      - name: Create release
        run: gh release create v${{ steps.prepare_notes.outputs.version }} --title ${{ steps.prepare_notes.outputs.version }} --notes-file ${{ steps.prepare_notes.outputs.notes }} --fail-on-no-commits ./out/CSharpDepsGraph.Cli.${{ steps.prepare_notes.outputs.version }}.nupkg
        env:
          GH_TOKEN: ${{ github.token }}